<!doctype html>
<html class="staticrypt-html">
  <head>
    <meta charset="utf-8" />
    <title>Growthify — Protected</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --black: #101010;
        --accent: #00FFC8;
        --accent-hover: #66FFDD;
        --bg: #191919;
        --card: #1F1F20;
        --text: #F2F2F2;
        --text-muted: #9A9FA6;
        --border: #2E2E30;
        --grey-light: #242426;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      html, body { height: 100%; }
      body { background-color: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
      .staticrypt-spinner-container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 10; }
      .staticrypt-spinner { width: 2rem; height: 2rem; border: 3px solid var(--border); border-right-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .staticrypt-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; gap: 40px; }
      .logo { display: flex; flex-direction: column; align-items: center; gap: 10px; user-select: none; }
      .logo-word { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
      .logo-word .dot { color: var(--accent); }
      .logo-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
      .card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 40px; display: flex; flex-direction: column; gap: 28px; }
      .card-header { text-align: center; display: flex; flex-direction: column; gap: 8px; }
      .card-label { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
      .card-subtitle { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
      #staticrypt-form { display: flex; flex-direction: column; gap: 16px; }
      .staticrypt-password-container { position: relative; }
      #staticrypt-password { width: 100%; background: var(--grey-light); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font); font-size: 15px; padding: 13px 44px 13px 16px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
      #staticrypt-password::placeholder { color: var(--text-muted); opacity: 0.7; }
      #staticrypt-password:focus { border-color: var(--accent); background: var(--bg); }
      .staticrypt-toggle-password-visibility { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; opacity: 0.45; cursor: pointer; transition: opacity 0.15s; }
      .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }
      .staticrypt-decrypt-button { width: 100%; background: var(--accent); color: var(--black); font-family: var(--font); font-size: 14px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 40px; padding: 15px 24px; cursor: pointer; transition: background 0.15s; -webkit-appearance: none; }
      .staticrypt-decrypt-button:hover { background: var(--accent-hover); }
      .staticrypt-decrypt-button:active { transform: scale(0.99); }
      label.staticrypt-remember { display: flex; align-items: center; gap: 10px; cursor: pointer; }
      .staticrypt-remember input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 2px; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: border-color 0.15s, background 0.15s; }
      .staticrypt-remember input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
      .staticrypt-remember input[type="checkbox"]:checked::after { content: ""; position: absolute; top: 1px; left: 4px; width: 4px; height: 7px; border: 2px solid var(--black); border-top: none; border-left: none; transform: rotate(45deg); }
      .remember-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.03em; }
      .footer { font-size: 11px; color: var(--text-muted); opacity: 0.6; letter-spacing: 0.08em; text-transform: uppercase; }
      .hidden { display: none !important; }
    </style>
  </head>

      </div>
      <div class="footer">Growthify — Confidential</div>

        staticryptConfig = /*[|staticrypt_config|]*/ 0;

      window.onload = async function () {
        const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
        if (!isSuccessful) {
          document.getElementById("staticrypt_loading").classList.add("hidden");

      const imgSrcEyeOpened = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBmaWxsPSJ3aGl0ZSIgZD0iTTI4OCAzMmMtODAuOCAwLTE0NS41IDM2LjgtMTkyLjYgODAuNkM0OC42IDE1NiAxNy4zIDIwOCAyLjUgMjQzLjdjLTMuMyA3LjktMy4zIDE2LjcgMCAyNC42QzE3LjMgMzA0IDQ4LjYgMzU2IDk1LjQgMzk5LjRDMTQyLjUgNDQzLjIgMjA3LjIgNDgwIDI4OCA0ODBzMTQ1LjUtMzYuOCAxOTIuNi04MC42YzQ2LjgtNDMuNSA3OC4xLTk1LjQgOTMtMTMxLjFjMy4zLTcuOSAzLjMtMTYuNyAwLTI0LjZjLTE0LjktMzUuNy00Ni4yLTg3LjctOTMtMTMxLjFDNDMzLjUgNjguOCAzNjguOCAzMiAyODggMzJ6TTE0NCAyNTZhMTQ0IDE0NCAwIDEgMSAyODggMCAxNDQgMTQ0IDAgMSAxIC0yODggMHptMTQ0LTY0YzAgMzUuMy0yOC43IDY0LTY0IDY0Yy03LjEgMC0xMy45LTEuMi0yMC4zLTMuM2MtNS41LTEuOC0xMS45IDEuNi0xMS43IDcuNGMuMyA2LjkgMS4zIDEzLjggMy4yIDIwLjdjMTMuNyA1MS4yIDY2LjQgODEuNiAxMTcuNiA2Ny45czgxLjYtNjYuNCA2Ny45LTExNy42Yy0xMS4xLTQxLjUtNDcuOC02OS40LTg4LjYtNzEuMWMtNS44LS4yLTkuMiA2LjEtNy40IDExLjdjMi4xIDYuNCAzLjMgMTMuMiAzLjMgMjAuM3oiLz48L3N2Zz4=";

        const passwordInput = document.getElementById("staticrypt-password");

        else { passwordInput.type = "password"; toggleIcon.src = imgSrcEyeClosed; toggleIcon.alt = templateToggleAltShow; toggleIcon.title = templateToggleAltShow; }
      });
      document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const password = document.getElementById("staticrypt-password").value,
          isRememberChecked = document.getElementById("staticrypt-remember").checked;
        const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
        if (!isSuccessful) { alert(templateError); }
      });

  </body>
</html>
